<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#0A0A0A"/>
  <!-- Four ascending bars — sales/training growth metaphor -->
  <rect x="4"  y="20" width="4" height="8"  fill="#0D9488"/>
  <rect x="11" y="16" width="4" height="12" fill="#0D9488"/>
  <rect x="18" y="11" width="4" height="17" fill="#0D9488"/>
  <rect x="25" y="6"  width="4" height="22" fill="#0D9488"/>
  <!-- Diagonal trend line connecting bar tops -->
  <path d="M6 20 L13 16 L20 11 L27 6"
        stroke="#FAFAFA" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
